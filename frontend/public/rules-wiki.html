<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SISTEM1 - Strategy Rules Wiki</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0a0e14; --bg2: #0d1117; --bg3: #131920;
    --border: rgba(255,255,255,0.06); --border2: rgba(255,255,255,0.1);
    --ink50: #e6edf3; --ink100: #c9d1d9; --ink200: #b1bac4;
    --ink300: #8b949e; --ink400: #6e7681; --ink500: #484f58;
    --up: #3ddc97; --down: #ff6b6b; --warn: #f0c674;
    --purple: #bc8cff; --blue: #58a6ff; --cyan: #56d4dd;
    --yellow: #f0c674; --orange: #f0a76b; --red: #ff6b6b;
    --teal: #3dccb4; --rose: #f06b8f; --indigo: #818cf8;
    --emerald: #34d399;
  }
  body { background: var(--bg); color: var(--ink100); font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6; }
  a { color: var(--blue); text-decoration: none; }

  .header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 12px 24px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
  .logo { width: 24px; height: 24px; background: var(--up); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: var(--bg); font-weight: 800; font-size: 13px; }
  .header-title { font-size: 13px; font-weight: 600; color: var(--ink50); letter-spacing: 0.05em; }
  .header-sub { font-size: 9px; color: var(--ink400); letter-spacing: 0.25em; }

  .container { max-width: 960px; margin: 0 auto; padding: 16px; }

  .filters { display: flex; gap: 6px; flex-wrap: wrap; padding: 12px 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .filter-btn { padding: 3px 10px; font-size: 9px; letter-spacing: 0.15em; border: 1px solid var(--border); background: var(--bg3); color: var(--ink400); cursor: pointer; font-family: inherit; transition: all 0.15s; }
  .filter-btn:hover { color: var(--ink200); border-color: var(--border2); }
  .filter-btn.active { border-color: rgba(61,220,151,0.3); background: rgba(61,220,151,0.1); color: var(--up); }

  .rule { border-bottom: 1px solid var(--border); }
  .rule-header { display: flex; align-items: center; gap: 10px; padding: 10px 0; cursor: pointer; user-select: none; }
  .rule-header:hover { opacity: 0.85; }
  .rule-num { font-size: 11px; color: var(--ink500); width: 28px; }
  .rule-name { font-size: 11px; color: var(--ink50); font-weight: 600; flex: 1; }
  .rule-cat { padding: 2px 8px; font-size: 9px; letter-spacing: 0.15em; border: 1px solid; border-radius: 0; }
  .rule-range { font-size: 10px; color: var(--ink400); width: 80px; text-align: right; font-variant-numeric: tabular-nums; }
  .arrow { font-size: 10px; color: var(--ink500); width: 16px; transition: transform 0.15s; }
  .rule.open .arrow { transform: rotate(90deg); }

  .rule-body { display: none; padding: 0 0 16px 28px; }
  .rule.open .rule-body { display: block; }

  .rule-desc { font-size: 11px; color: var(--ink300); margin-bottom: 12px; line-height: 1.7; }

  .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  @media (max-width: 640px) { .info-grid { grid-template-columns: 1fr; } }
  .info-box { background: var(--bg2); border: 1px solid var(--border); padding: 10px; }
  .info-label { font-size: 9px; color: var(--ink400); letter-spacing: 0.25em; margin-bottom: 6px; }
  .info-text { font-size: 10px; color: var(--ink200); line-height: 1.6; }
  .tag { display: inline-block; padding: 2px 6px; background: var(--bg3); border: 1px solid var(--border); font-size: 9px; color: var(--ink200); margin: 2px; }

  .threshold-table { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-collapse: collapse; }
  .threshold-table th { text-align: left; padding: 6px 10px; font-size: 9px; color: var(--ink400); letter-spacing: 0.15em; font-weight: normal; border-bottom: 1px solid var(--border); }
  .threshold-table td { padding: 5px 10px; font-size: 10px; border-bottom: 1px solid rgba(255,255,255,0.02); }
  .threshold-table tr:hover { background: rgba(255,255,255,0.015); }
  .score-pos { color: var(--up); font-weight: 600; }
  .score-neg { color: var(--down); font-weight: 600; }
  .score-neut { color: var(--ink300); }
  .side-long { color: var(--up); font-size: 9px; letter-spacing: 0.1em; }
  .side-short { color: var(--down); font-size: 9px; letter-spacing: 0.1em; }
  .side-neutral { color: var(--ink400); font-size: 9px; letter-spacing: 0.1em; }

  .cat-momentum { color: var(--purple); border-color: rgba(188,140,255,0.3); background: rgba(188,140,255,0.1); }
  .cat-trend { color: var(--blue); border-color: rgba(88,166,255,0.3); background: rgba(88,166,255,0.1); }
  .cat-confirmation { color: var(--cyan); border-color: rgba(86,212,221,0.3); background: rgba(86,212,221,0.1); }
  .cat-volume { color: var(--yellow); border-color: rgba(240,198,116,0.3); background: rgba(240,198,116,0.1); }
  .cat-divergence { color: var(--orange); border-color: rgba(240,167,107,0.3); background: rgba(240,167,107,0.1); }
  .cat-volatility { color: var(--red); border-color: rgba(255,107,107,0.3); background: rgba(255,107,107,0.1); }
  .cat-sentiment { color: var(--teal); border-color: rgba(61,204,180,0.3); background: rgba(61,204,180,0.1); }
  .cat-risk { color: var(--rose); border-color: rgba(240,107,143,0.3); background: rgba(240,107,143,0.1); }
  .cat-meta { color: var(--indigo); border-color: rgba(129,140,248,0.3); background: rgba(129,140,248,0.1); }
  .cat-advanced { color: var(--emerald); border-color: rgba(52,211,153,0.3); background: rgba(52,211,153,0.1); }

  .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .toolbar button { background: none; border: none; color: var(--ink400); font-family: inherit; font-size: 9px; cursor: pointer; letter-spacing: 0.15em; }
  .toolbar button:hover { color: var(--ink200); }
  .toolbar .sep { color: var(--ink500); }

  .summary { margin-top: 24px; background: var(--bg2); border: 1px solid var(--border); padding: 16px; }
  .summary h3 { font-size: 9px; color: var(--ink400); letter-spacing: 0.25em; margin-bottom: 10px; }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
  .summary-item { padding: 8px; background: var(--bg3); border: 1px solid var(--border); }
  .summary-item .num { font-size: 9px; color: var(--ink500); }
  .summary-item .name { font-size: 10px; color: var(--ink200); margin-top: 2px; }
  .summary-item .range { font-size: 10px; color: var(--ink100); margin-top: 4px; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">S</div>
  <div>
    <div class="header-title">SISTEM1</div>
    <div class="header-sub">STRATEGY RULES WIKI</div>
  </div>
</div>

<div class="container">
  <div class="filters" id="filters"></div>
  <div class="toolbar">
    <button onclick="expandAll()">EXPAND ALL</button>
    <span class="sep">|</span>
    <button onclick="collapseAll()">COLLAPSE ALL</button>
    <span style="margin-left:auto;font-size:9px;color:var(--ink500)" id="count"></span>
  </div>
  <div id="rules-list"></div>

  <div class="summary">
    <h3>SCORE RANGE SUMMARY</h3>
    <div class="summary-grid" id="summary-grid"></div>
  </div>
</div>

<script>
const RULES = [
  {
    key:'rule_01',num:1,name:'1m/5m Extreme RSI+StochRSI',cat:'Momentum',
    desc:'1m ve 5m timeframe\'lerde RSI ve StochRSI\'nin eszamanli olarak asiri alim/satim bolgesinde olmasi durumunu tespit eder. En guclu reversal sinyallerinden biridir.',
    logic:'RSI ve StochRSI birlikte asiri bolgede ise guclu counter-trend sinyal uretir. 1m+5m birlikte ise skor artar.',
    range:'+/-2 ~ +/-3', tfs:['1m','5m'], inputs:['RSI','StochRSI'],
    thresholds:[
      {c:'RSI1m<20 & SRSI1m<20 & RSI5m<30 & SRSI5m<30',s:'+3',side:'long'},
      {c:'RSI1m<20 & SRSI1m<20',s:'+2',side:'long'},
      {c:'RSI1m>80 & SRSI1m>80 & RSI5m>70 & SRSI5m>70',s:'-3',side:'short'},
      {c:'RSI1m>80 & SRSI1m>80',s:'-2',side:'short'},
    ]
  },
  {
    key:'rule_02',num:2,name:'H1 RSI Trend',cat:'Trend',
    desc:'Saatlik RSI seviyesine bakarak genel trend yonunu belirler. Trend takibi ve reversal bolgelerini ayirt eder.',
    logic:'H1 RSI\'nin belli araliklarinda trend/reversal sinyali uretir. Asiri bolgelerde counter-trend, orta bolgelerde trend-takip.',
    range:'+/-0.5 ~ +/-1.5', tfs:['1H'], inputs:['RSI'],
    thresholds:[
      {c:'RSI_H1 < 30',s:'+1.5',side:'long'},{c:'RSI_H1 60-65',s:'+1',side:'long'},
      {c:'RSI_H1 55-60',s:'+0.5',side:'long'},{c:'RSI_H1 > 70',s:'-1.5',side:'short'},
      {c:'RSI_H1 40-45',s:'-1',side:'short'},{c:'RSI_H1 35-40',s:'-0.5',side:'short'},
    ]
  },
  {
    key:'rule_03',num:3,name:'5m RSI Confirmation',cat:'Confirmation',
    desc:'5 dakikalik RSI okumasi ile diger kurallarin verdigi yonu teyit eder. Tek basina guclu degil ama dogrulama icin onemli.',
    logic:'RSI>60 bullish, RSI<40 bearish. Asiri bolgelerde (>70, <30) ters sinyal.',
    range:'+/-1', tfs:['5m'], inputs:['RSI'],
    thresholds:[
      {c:'RSI_5m > 70',s:'-1',side:'short'},{c:'RSI_5m > 60',s:'+1',side:'long'},
      {c:'RSI_5m < 30',s:'+1',side:'long'},{c:'RSI_5m < 40',s:'-1',side:'short'},
    ]
  },
  {
    key:'rule_04',num:4,name:'StochRSI Extreme',cat:'Momentum',
    desc:'5m ve 15m StochRSI\'de asiri alim/satim bolgelerini tespit eder. RSI\'ye gore daha hassas ve erken sinyal verir.',
    logic:'5m ve 15m StochRSI birlikte extreme ise guclu sinyal. Tek basina 5m extreme ise orta sinyal.',
    range:'+/-1 ~ +/-2', tfs:['5m','15m'], inputs:['StochRSI'],
    thresholds:[
      {c:'SRSI_5m>90 & SRSI_15m>80',s:'-2',side:'short'},{c:'SRSI_5m>80',s:'-1',side:'short'},
      {c:'SRSI_5m<10 & SRSI_15m<20',s:'+2',side:'long'},{c:'SRSI_5m<20',s:'+1',side:'long'},
    ]
  },
  {
    key:'rule_05',num:5,name:'Volume Spike',cat:'Volume',
    desc:'Hacim artislarini tespit eder. Yukselis trendinde hacim artisi bullish, dusus trendinde bearish olarak yorumlanir.',
    logic:'Hacim degisim yuzdesi esik degerlerine gore skorlanir. Fiyat yonu negatifse skor ters cevirilir.',
    range:'+/-0.5 ~ +/-2', tfs:['24H'], inputs:['Volume','Price Change'],
    thresholds:[
      {c:'Volume > %200 & fiyat yukselis',s:'+2',side:'long'},{c:'Volume > %80 & fiyat yukselis',s:'+1',side:'long'},
      {c:'Volume > %30 & fiyat yukselis',s:'+0.5',side:'long'},
      {c:'Volume > %200 & fiyat dusus',s:'-2',side:'short'},{c:'Volume > %80 & fiyat dusus',s:'-1',side:'short'},
      {c:'Volume > %30 & fiyat dusus',s:'-0.5',side:'short'},
    ]
  },
  {
    key:'rule_06',num:6,name:'Timeframe Divergence',cat:'Divergence',
    desc:'5m ve H1 RSI arasindaki uyumsuzlugu tespit eder. Kisa vadeli asiri hareket, uzun vadeli trendle celisiyorsa reversal sinyali uretir.',
    logic:'5m RSI asiri alimda iken H1 RSI dusuk ise bearish uyumsuzluk (ve tersi).',
    range:'+/-1 ~ +/-1.5', tfs:['5m','1H'], inputs:['RSI'],
    thresholds:[
      {c:'RSI_5m>70 & RSI_H1<40',s:'-1.5',side:'short'},{c:'RSI_5m>65 & RSI_H1<45',s:'-1',side:'short'},
      {c:'RSI_5m<30 & RSI_H1>60',s:'+1.5',side:'long'},{c:'RSI_5m<35 & RSI_H1>55',s:'+1',side:'long'},
    ]
  },
  {
    key:'rule_07',num:7,name:'Multi-TF Alignment',cat:'Trend',
    desc:'5m, 15m, H1 ve H4 timeframe\'lerinde RSI uyumunu kontrol eder. Tum timeframe\'ler ayni yonde ise guclu trend sinyali.',
    logic:'Her TF\'de RSI>55 bullish, RSI<45 bearish sayilir. 4/4 uyum en guclu, 3/4 orta sinyal.',
    range:'+/-1 ~ +/-2', tfs:['5m','15m','1H','4H'], inputs:['RSI'],
    thresholds:[
      {c:'4/4 TF bullish (RSI>55)',s:'+2',side:'long'},{c:'3/4 TF bullish',s:'+1',side:'long'},
      {c:'4/4 TF bearish (RSI<45)',s:'-2',side:'short'},{c:'3/4 TF bearish',s:'-1',side:'short'},
    ]
  },
  {
    key:'rule_08',num:8,name:'All RSI Extreme',cat:'Momentum',
    desc:'Birden fazla timeframe\'de RSI\'nin ayni anda asiri bolgede olmasini kontrol eder. Nadir ama guclu sinyal.',
    logic:'1m, 5m, 15m, H1\'de RSI>70 veya RSI<30 olanlarin sayisi.',
    range:'+/-1 ~ +/-2', tfs:['1m','5m','15m','1H'], inputs:['RSI'],
    thresholds:[
      {c:'3+ TF RSI>70',s:'-2',side:'short'},{c:'2+ TF RSI>70',s:'-1',side:'short'},
      {c:'3+ TF RSI<30',s:'+2',side:'long'},{c:'2+ TF RSI<30',s:'+1',side:'long'},
    ]
  },
  {
    key:'rule_09',num:9,name:'Pump/Dump Detection',cat:'Volatility',
    desc:'24 saatte %15+ hareket eden coinlerde, RSI ile birlikte pump/dump tespiti yapar. Asiri hareket sonrasi geri donus sinyali.',
    logic:'%15+ yukselis + RSI asiri alim = short (pump sonrasi dusus). %15+ dusus + RSI asiri satim = long (dump sonrasi toparlanma).',
    range:'+/-2 ~ +/-3', tfs:['24H','5m'], inputs:['Price Change','RSI'],
    thresholds:[
      {c:'Fiyat>%15 & RSI_5m>80',s:'-3',side:'short'},{c:'Fiyat>%15 & RSI_5m>70',s:'-2',side:'short'},
      {c:'Fiyat<%-15 & RSI_5m<20',s:'+3',side:'long'},{c:'Fiyat<%-15 & RSI_5m<30',s:'+2',side:'long'},
    ]
  },
  {
    key:'rule_10',num:10,name:'Funding Rate',cat:'Sentiment',
    desc:'Perpetual futures funding rate\'ini analiz eder. Yuksek pozitif FR = piyasa asiri long, negatif FR = asiri short.',
    logic:'FR yukseldikce counter-trend sinyal guclenir. 3 seviye esik: %0.02, %0.05, %0.10.',
    range:'+/-0.5 ~ +/-2', tfs:['8H cycle'], inputs:['Funding Rate'],
    thresholds:[
      {c:'FR > %0.10',s:'-2',side:'short'},{c:'FR > %0.05',s:'-1',side:'short'},
      {c:'FR > %0.02',s:'-0.5',side:'short'},
      {c:'FR < -%0.10',s:'+2',side:'long'},{c:'FR < -%0.05',s:'+1',side:'long'},
      {c:'FR < -%0.02',s:'+0.5',side:'long'},
    ]
  },
  {
    key:'rule_11',num:11,name:'Open Interest',cat:'Sentiment',
    desc:'Acik pozisyon miktarindaki degisimi fiyat hareketiyle birlikte analiz eder. OI artisi + fiyat artisi = trend devami.',
    logic:'OI degisimi ve fiyat yonu birlestirilerek trend gucu veya zayifligi belirlenir.',
    range:'+/-0.5 ~ +/-1', tfs:['24H'], inputs:['Open Interest','Price Change'],
    thresholds:[
      {c:'OI>%5 & fiyat yukselis',s:'+1',side:'long'},{c:'OI>%3 & fiyat yukselis',s:'+0.5',side:'long'},
      {c:'OI>%5 & fiyat dusus',s:'-1',side:'short'},{c:'OI<%-5 (likuidasyon)',s:'+/-0.5',side:'neutral'},
    ]
  },
  {
    key:'rule_12',num:12,name:'Anti-Chase Penalty',cat:'Risk',
    desc:'Buyuk hareket sonrasi FOMO ile giris yapmayi engeller. %8+ momentum olan coinlere giris cezasi uygular.',
    logic:'Fiyat cok hareket etmisse ayni yonde giris skorunu dusurur. Tersi yonu destekler.',
    range:'+/-1 ~ +/-2', tfs:['24H'], inputs:['Price Change'],
    thresholds:[
      {c:'Fiyat>%15 yukselis',s:'-2 (long ceza)',side:'short'},{c:'Fiyat>%10 yukselis',s:'-1.5',side:'short'},
      {c:'Fiyat>%8 yukselis',s:'-1',side:'short'},
      {c:'Fiyat<%-15 dusus',s:'+2 (short ceza)',side:'long'},{c:'Fiyat<%-10 dusus',s:'+1.5',side:'long'},
      {c:'Fiyat<%-8 dusus',s:'+1',side:'long'},
    ]
  },
  {
    key:'rule_13',num:13,name:'Conviction Bonus',cat:'Meta',
    desc:'Meta-kural: Diger kurallardan kac tanesi ayni yonde sinyal verdigini sayar. 4+ kural ayni yonde ise bonus puan ekler.',
    logic:'Tum kurallarin sonuclari taranir. Ayni yone isaret eden kural sayisi esik degerini gecerse bonus verilir.',
    range:'+/-1 ~ +/-2', tfs:['--'], inputs:['Diger kurallarin ciktilari'],
    thresholds:[
      {c:'6+ kural long',s:'+2',side:'long'},{c:'4+ kural long',s:'+1',side:'long'},
      {c:'6+ kural short',s:'-2',side:'short'},{c:'4+ kural short',s:'-1',side:'short'},
    ]
  },
  {
    key:'rule_14',num:14,name:'RSI Divergence + NW + WT',cat:'Advanced',
    desc:'Kompozit kural: 4H RSI divergence tespiti, Nadaraya-Watson band pozisyonu ve Wave Trend gostergelerini birlestirir. 1H ve Daily ile teyit.',
    logic:'4H\'de fiyat yeni tepe/dip yaparken RSI yapmiyorsa divergence. NW bandi ve WT sinyalleri ile dogrulanir. Coklu teyit = guclu sinyal.',
    range:'+/-0.5 ~ +/-2.5+', tfs:['1H','4H','1D'], inputs:['RSI','Nadaraya-Watson','Wave Trend','Price Pivots'],
    thresholds:[
      {c:'4H bearish div + NW + WT',s:'-2.5',side:'short'},{c:'4H bearish div (teyitli)',s:'-1.5',side:'short'},
      {c:'4H bearish forming',s:'-0.75',side:'short'},
      {c:'4H bullish div + NW + WT',s:'+2.5',side:'long'},{c:'4H bullish div (teyitli)',s:'+1.5',side:'long'},
      {c:'4H bullish forming',s:'+0.75',side:'long'},
    ]
  },
  {
    key:'rule_15',num:15,name:'FR Momentum (Symmetric)',cat:'Sentiment',
    desc:'Pozitif ve negatif funding rate momentumunu birlikte izler. Negatif FR duzelirken short squeeze long, pozitif FR zayiflarken short setup arar.',
    logic:'Asiri FR kotulesiyorsa notr/danger; asiri FR iyilesiyorsa reversal. Hızli funding cycle ve iyilesen momentum bonus getirir.',
    range:'-3 ~ +4', tfs:['FR cycle'], inputs:['Funding Rate','FR History','Price Change'],
    thresholds:[
      {c:'Extreme negative FR (<-0.75%) & improving',s:'+2',side:'long'},
      {c:'Extreme positive FR (>0.75%) & dropping',s:'-2',side:'short'},
      {c:'Extreme FR worsening',s:'0',side:'neutral'},
      {c:'Neg FR [-0.10,0) + price up >10%',s:'+2',side:'long'},
      {c:'Pos FR (0,0.10] + price down >10%',s:'-2',side:'short'},
    ]
  },
  {
    key:'rule_16',num:16,name:'FR Settlement Timing',cat:'Sentiment',
    desc:'Funding settlement saatine gore sinyal kalitesini ayarlar. FR etkisinin en belirgin oldugu saatleri skorlar.',
    logic:'UTC 02:00 en iyi saat olarak long bonus, UTC 08:00 en zayif saat olarak short/ceza etkisi verir.',
    range:'+/-1', tfs:['Settlement cycle'], inputs:['UTC Hour','Funding Rate'],
    thresholds:[
      {c:'UTC 02:00',s:'+1',side:'long'},
      {c:'UTC 00:00-04:00',s:'+0.5',side:'long'},
      {c:'UTC 08:00',s:'-1',side:'short'},
      {c:'UTC 06:00-10:00',s:'-0.5',side:'short'},
    ]
  },
  {
    key:'rule_17',num:17,name:'Weekend Penalty',cat:'Risk',
    desc:'Hafta sonu sinyallerine direction-aware ceza uygular. Dusuk likidite ve manipulasyon riskini azaltir.',
    logic:'UP sinyalinde long skorunu zayiflatir, DOWN sinyalinde short skorunu zayiflatir. Cuma aksami yarim ceza uygular.',
    range:'-1 ~ +1', tfs:['Daily'], inputs:['Day of Week','Alert Direction','Prior Rules'],
    thresholds:[
      {c:'Cumartesi/Pazar + UP',s:'-1',side:'short'},
      {c:'Cumartesi/Pazar + DOWN',s:'+1',side:'long'},
      {c:'Cuma >=18:00 UTC + UP',s:'-0.5',side:'short'},
      {c:'Cuma >=18:00 UTC + DOWN',s:'+0.5',side:'long'},
    ]
  },
  {
    key:'rule_18',num:18,name:'FR Extreme Guard',cat:'Risk',
    desc:'Asiri funding seviyelerinde koruma ve entry mekanizmasi. Ultra negatif FR delisting/scam riski tasidigindan cezalandirilir.',
    logic:'Kaliteli negatif FR bolgesinde long bonus; cok ekstrem negatif/pozitif FR bolgelerinde risk cezasi. Confluence varsa bonus/ceza artar.',
    range:'-5 ~ +3.5', tfs:['FR cycle'], inputs:['Funding Rate','Prior Rules'],
    thresholds:[
      {c:'FR < -1.5%',s:'-3',side:'short'},
      {c:'FR < -0.75%',s:'-2',side:'short'},
      {c:'FR -0.05% ~ -0.005%',s:'+2',side:'long'},
      {c:'FR -0.005% ~ +0.005%',s:'+1',side:'long'},
      {c:'FR > +0.10%',s:'-2',side:'short'},
    ]
  },
  {
    key:'rule_19',num:19,name:'RSI Direction Filter',cat:'Momentum',
    desc:'Alert yonunu H1 RSI seviyesiyle karsilastirarak sinyal kalitesini olcer.',
    logic:'H1 RSI overbought + DOWN guclu reversal setup; H1 RSI oversold + UP zayif trap olabilir.',
    range:'-2 ~ +3', tfs:['1H'], inputs:['RSI H1','Alert Direction'],
    thresholds:[
      {c:'H1 RSI > 80 + DOWN',s:'+3',side:'long'},
      {c:'H1 RSI > 70 + DOWN',s:'+2',side:'long'},
      {c:'H1 RSI < 20 + UP',s:'-2',side:'short'},
      {c:'H1 RSI < 30 + UP',s:'-1.5',side:'short'},
    ]
  },
  {
    key:'rule_20',num:20,name:'Boost Value Filter',cat:'Momentum',
    desc:'Alert boost value ile sinyal gucunu olcer. Yuksek boost momentum kalitesini, dusuk boost zayif sinyali temsil eder.',
    logic:'Boost yukseldikce long/momentum skoru artar; cok dusuk boost sinyali zayiflatir.',
    range:'-1.5 ~ +2', tfs:['--'], inputs:['Boost Value','Alert Direction'],
    thresholds:[
      {c:'Boost > 30%',s:'+2',side:'long'},
      {c:'Boost > 20%',s:'+1.5',side:'long'},
      {c:'Boost 10-20%',s:'+1',side:'long'},
      {c:'Boost < 2%',s:'-1.5',side:'short'},
      {c:'Boost < 5%',s:'-1',side:'short'},
    ]
  },
  {
    key:'rule_21',num:21,name:'UT Bot 5m',cat:'Momentum',
    desc:'5m mumlarda ATR trailing-stop tabanli UT Bot buy/sell sinyalini uygular.',
    logic:'ATR trailing-stop kirilimi ve 5m close yonu ile buy long, sell short skoru uretir.',
    range:'+/-1.5', tfs:['5m'], inputs:['ATR','Trailing Stop','Close'],
    thresholds:[
      {c:'5m UT Bot BUY',s:'+1.5',side:'long'},
      {c:'5m UT Bot SELL',s:'-1.5',side:'short'},
      {c:'No signal',s:'0',side:'neutral'},
    ]
  },
  {
    key:'rule_22',num:22,name:'RSI Drop Strategy (Daily MR)',cat:'Momentum',
    desc:'Daily long-term trend filtresi + oversold + 3 gun ust uste RSI dususu ile mean-reversion long setup arar.',
    logic:'Close>SMA200, RSI(2)<20 ve RSI(2) uc gun dusmusse long bounce sinyali verir. RSI(2)>70 hafif short bias.',
    range:'+3 / -1', tfs:['1D'], inputs:['Close','SMA(200)','RSI(2)'],
    thresholds:[
      {c:'close>SMA200 + RSI(2)<20 + 3-day drop',s:'+3',side:'long'},
      {c:'RSI(2) > 70',s:'-1',side:'short'},
      {c:'Other states',s:'0',side:'neutral'},
    ]
  },
  {
    key:'rule_23',num:23,name:'EMA 5/9 Crossover (5m)',cat:'Trend',
    desc:'5m EMA(5) ve EMA(9) kesisimlerini takip eder. Golden cross long, death cross short.',
    logic:'Mevcut mumdaki cross en guclu sinyal; son 3 mum icindeki cross orta sinyal; EMA hizasi trend teyidi.',
    range:'+/-0.5 ~ +/-2', tfs:['5m'], inputs:['EMA(5)','EMA(9)','Close'],
    thresholds:[
      {c:'5m golden cross current bar',s:'+2',side:'long'},
      {c:'5m death cross current bar',s:'-2',side:'short'},
      {c:'Cross within last 3 bars golden',s:'+1',side:'long'},
      {c:'EMA5 above EMA9',s:'+0.5',side:'long'},
    ]
  },
  {
    key:'rule_24',num:24,name:'EMA 5/9 Crossover (15m)',cat:'Trend',
    desc:'15m EMA(5) ve EMA(9) kesisimlerini takip eder. 5m versiyonuna gore daha yavas ama daha temiz trend teyidi verir.',
    logic:'Mevcut mumdaki cross +/-2, son 3 mum icindeki cross +/-1, EMA hizasi +/-0.5.',
    range:'+/-0.5 ~ +/-2', tfs:['15m'], inputs:['EMA(5)','EMA(9)','Close'],
    thresholds:[
      {c:'15m golden cross current bar',s:'+2',side:'long'},
      {c:'15m death cross current bar',s:'-2',side:'short'},
      {c:'Cross within last 3 bars death',s:'-1',side:'short'},
      {c:'EMA5 below EMA9',s:'-0.5',side:'short'},
    ]
  },
  {
    key:'rule_25',num:25,name:'FR Squeeze Setup',cat:'Sentiment',
    desc:'Negatif FR + OI artisi + hacim kombinasyonunda short squeeze long setup arar.',
    logic:'FR<-0.05%, FR iyilesiyor, OI artiyor ve hacim yeterliyse geri sayima gore skor verir. Ekstrem negatif FR ek bonus alir.',
    range:'+2 ~ +7', tfs:['FR cycle'], inputs:['Funding Rate','FR History','Open Interest','Volume'],
    thresholds:[
      {c:'FR<-1% & OI up & volume & countdown <1H',s:'+5',side:'long'},
      {c:'FR<-0.05% & OI up & volume & countdown <1H',s:'+4',side:'long'},
      {c:'FR<-0.05% & countdown 1-4H',s:'+3',side:'long'},
      {c:'Bonus FR<-0.20%',s:'+2',side:'long'},
    ]
  },
  {
    key:'rule_26',num:26,name:'ADX Trend Strength (1H)',cat:'Trend',
    desc:'1H mumlarda ADX(14) trend gucunu, +DI/-DI ise yonu olcer.',
    logic:'ADX>40 cok guclu trend, ADX>25 guclu trend, ADX<20 yatay piyasa. +DI/-DI yonu belirler.',
    range:'+/-0.5 ~ +/-2', tfs:['1H'], inputs:['ADX(14)','+DI','-DI'],
    thresholds:[
      {c:'ADX > 40 & +DI > -DI',s:'+2',side:'long'},
      {c:'ADX > 25 & +DI > -DI',s:'+1.5',side:'long'},
      {c:'ADX > 40 & -DI > +DI',s:'-2',side:'short'},
      {c:'ADX > 25 & -DI > +DI',s:'-1.5',side:'short'},
      {c:'ADX < 20',s:'0',side:'neutral'},
    ]
  },
  {
    key:'rule_27',num:27,name:'ATR Volatility Breakout (15m)',cat:'Volatility',
    desc:'15m kapanisin onceki 20 mum high/low seviyelerini ATR(14) ile olceklenmis sekilde kirip kirmadigini izler.',
    logic:'Statik yuzde yerine ATR kullandigi icin coin oynakligina uyum saglar. Yukari kirilim long, asagi kirilim short.',
    range:'+/-1 ~ +/-2', tfs:['15m'], inputs:['ATR(14)','20-bar High/Low','Close'],
    thresholds:[
      {c:'close > priorHigh + 1xATR',s:'+2',side:'long'},
      {c:'close > priorHigh',s:'+1',side:'long'},
      {c:'close < priorLow - 1xATR',s:'-2',side:'short'},
      {c:'close < priorLow',s:'-1',side:'short'},
    ]
  },
];

const CAT_CLASS = {
  Momentum:'cat-momentum',Trend:'cat-trend',Confirmation:'cat-confirmation',
  Volume:'cat-volume',Divergence:'cat-divergence',Volatility:'cat-volatility',
  Sentiment:'cat-sentiment',Risk:'cat-risk',Meta:'cat-meta',Advanced:'cat-advanced'
};

let activeFilter = 'all';

function render() {
  const filtered = activeFilter === 'all' ? RULES : RULES.filter(r => r.cat === activeFilter);
  document.getElementById('count').textContent = filtered.length + ' rules';

  const cats = ['all', ...new Set(RULES.map(r => r.cat))];
  document.getElementById('filters').innerHTML = cats.map(c =>
    `<button class="filter-btn ${activeFilter===c?'active':''}" onclick="setFilter('${c}')">${c.toUpperCase()}</button>`
  ).join('');

  document.getElementById('rules-list').innerHTML = filtered.map(r => `
    <div class="rule" id="${r.key}" onclick="toggleRule('${r.key}')">
      <div class="rule-header">
        <span class="arrow">&#9654;</span>
        <span class="rule-num">#${String(r.num).padStart(2,'0')}</span>
        <span class="rule-name">${r.name}</span>
        <span class="rule-cat ${CAT_CLASS[r.cat]||''}">${r.cat.toUpperCase()}</span>
        <span class="rule-range">${r.range}</span>
      </div>
      <div class="rule-body">
        <p class="rule-desc">${r.desc}</p>
        <div class="info-grid">
          <div class="info-box">
            <div class="info-label">MANTIK</div>
            <div class="info-text">${r.logic}</div>
          </div>
          <div class="info-box">
            <div class="info-label">TIMEFRAMES</div>
            <div style="margin-bottom:6px">${r.tfs.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
            <div class="info-label">INPUTS</div>
            <div>${r.inputs.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
          </div>
        </div>
        <table class="threshold-table">
          <thead><tr><th>CONDITION</th><th style="text-align:center;width:80px">SCORE</th><th style="text-align:center;width:60px">SIDE</th></tr></thead>
          <tbody>${r.thresholds.map(t => {
            const sc = t.s.startsWith('+') ? 'score-pos' : t.s.startsWith('-') ? 'score-neg' : 'score-neut';
            const sd = t.side==='long'?'side-long':t.side==='short'?'side-short':'side-neutral';
            return `<tr><td style="color:var(--ink200)">${t.c}</td><td style="text-align:center" class="${sc}">${t.s}</td><td style="text-align:center" class="${sd}">${t.side.toUpperCase()}</td></tr>`;
          }).join('')}</tbody>
        </table>
      </div>
    </div>
  `).join('');

  document.getElementById('summary-grid').innerHTML = RULES.map(r => `
    <div class="summary-item">
      <div class="num">#${String(r.num).padStart(2,'0')} ${r.cat}</div>
      <div class="name">${r.name}</div>
      <div class="range">${r.range}</div>
    </div>
  `).join('');
}

function toggleRule(key) {
  const el = document.getElementById(key);
  if (el) el.classList.toggle('open');
  event.stopPropagation();
}

function expandAll() { document.querySelectorAll('.rule').forEach(r => r.classList.add('open')); }
function collapseAll() { document.querySelectorAll('.rule').forEach(r => r.classList.remove('open')); }

function setFilter(cat) {
  activeFilter = cat;
  render();
}

render();
</script>
</body>
</html>
